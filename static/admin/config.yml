# ============================================================
# Sveltia CMS Configuration for Dzulfahmi's Portfolio
# CMS Admin Panel: https://fahmidza.github.io/portfolio/admin/
# ============================================================

backend:
  name: github
  repo: fahmidza/portfolio
  branch: main

# Site URL (needed for Docusaurus baseUrl prefix)
site_url: https://fahmidza.github.io/portfolio
display_url: https://fahmidza.github.io/portfolio

# Media files stored in static/img (Docusaurus convention)
media_folder: "static/img"
public_folder: "/img"

# Slug settings
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# ============================================================
# COLLECTIONS
# ============================================================

collections:
  # ----------------------------------------------------------
  # 📝 Blog Posts
  # ----------------------------------------------------------
  - name: "blog"
    label: "📝 Blog & Activities"
    label_singular: "Blog Post"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{commit_date}}"
    sortable_fields:
      fields: ["title", "commit_date"]
    fields:
      - label: "Slug (URL)"
        name: "slug"
        widget: "string"
        hint: "URL-friendly name, e.g. 'my-new-post'"

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Authors"
        name: "authors"
        widget: "list"
        default: ["fahmidza"]
        hint: "Author IDs defined in blog/authors.yml"

      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "Ketik tag baru atau yang sudah ada. Jika tag baru, Docusaurus akan memberi warning sampai Anda mendaftarkannya di tags.yml. [Edit Tags Blog di Github](https://github.com/fahmidza/portfolio/edit/main/blog/tags.yml) lalu tunggu sebentar hingga proses build selesai."

      - label: "Body"
        name: "body"
        widget: "markdown"

# ----------------------------------------------------------
  # 🚀 Projects
  # ----------------------------------------------------------
  - name: "projects"
    label: "🚀 Projects"
    label_singular: "Project"
    folder: "docs/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - label: "Sidebar Position"
        name: "sidebar_position"
        widget: "number"
        value_type: "int"
        min: 1
        required: false

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "Ketik tag. Jika tag baru, daftarkan di tags.yml agar tidak error. [Edit Tags Project di Github](https://github.com/fahmidza/portfolio/edit/main/docs/tags.yml) dan tunggu proses build selesai."

      - label: "Body"
        name: "body"
        widget: "markdown"

  # ----------------------------------------------------------
  # 📄 Standalone Pages (About Me, Welcome/Intro)
  # ----------------------------------------------------------
  - name: "pages"
    label: "📄 Pages"
    files:
      - name: "about"
        label: "About Me"
        file: "docs/about.md"
        fields:
          - label: "Sidebar Position"
            name: "sidebar_position"
            widget: "number"
            value_type: "int"
            default: 99

          - label: "Title"
            name: "title"
            widget: "string"

          - label: "Description"
            name: "description"
            widget: "text"

          - label: "Body"
            name: "body"
            widget: "markdown"

      - name: "intro"
        label: "Projects Index & Welcome"
        file: "docs/projects/index.mdx"
        extension: "mdx"
        format: "frontmatter"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"

          - label: "Description"
            name: "description"
            widget: "text"

          - label: "Hide Table of Contents"
            name: "hide_table_of_contents"
            widget: "boolean"
            default: true

          - label: "Body"
            name: "body"
            widget: "markdown"
            hint: "Do not remove the <ProjectFilter /> component at the bottom."

  # ----------------------------------------------------------
  # ⚙️ Settings & Tags
  # ----------------------------------------------------------
  - name: "settings"
    label: "⚙️ Settings & Tags"
    files:
      - name: "blog_tags"
        label: "📝 Blog Tags (tags.yml)"
        file: "blog/tags.yml"
        extension: "yml"
        format: "raw"
        fields:
          - label: "Raw YAML Config"
            name: "body"
            widget: "text"
            hint: "Format:\ntag-slug:\n  label: Tag Name\n  description: Tag description"

      - name: "project_tags"
        label: "🚀 Project Tags (tags.yml)"
        file: "docs/tags.yml"
        extension: "yml"
        format: "raw"
        fields:
          - label: "Raw YAML Config"
            name: "body"
            widget: "text"
            hint: "Format:\ntag-slug:\n  label: Tag Name\n  description: Tag description"
