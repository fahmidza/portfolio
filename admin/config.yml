# ============================================================
# Sveltia CMS Configuration for Dzulfahmi's Portfolio
# CMS Admin Panel: https://fahmidza.github.io/portfolio/admin/
# ============================================================

backend:
  name: github
  repo: fahmidza/portfolio
  branch: main

# Site URL (needed for Docusaurus baseUrl prefix)
site_url: https://fahmidza.github.io/portfolio
display_url: https://fahmidza.github.io/portfolio

# Media files stored in static/img (Docusaurus convention)
media_folder: "static/img"
public_folder: "/img"

# Slug settings
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# ============================================================
# COLLECTIONS
# ============================================================

collections:
  # ----------------------------------------------------------
  # 🏠 Home
  # ----------------------------------------------------------
  - name: "home"
    label: "🏠 Home"
    files:
      - label: "Home Settings"
        name: "home_settings"
        file: "data/home.json"
        fields:
          - label: "Hero Roles (Animasi Teks)"
            name: "hero_roles"
            widget: "list"
            hint: "Daftar role/pekerjaan yang akan muncul bergantian di animasi halaman depan."
            field: {label: "Role", name: "role", widget: "string"}
          
          - label: "Hero Description"
            name: "hero_description"
            widget: "text"
            hint: "Deskripsi singkat tentang Anda yang muncul di halaman utama (Home) di bawah peran/role animasi."

  # ----------------------------------------------------------
  # 🚀 Projects
  # ----------------------------------------------------------
  - name: "projects"
    label: "🚀 Projects"
    label_singular: "Project"
    folder: "docs/projects"
    extension: "md"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Tags"
        name: "tags"
        widget: "relation"
        collection: "site_settings"
        file: "project_tags"
        search_fields: ["tags.*.name"]
        display_fields: ["tags.*.name"]
        value_field: "tags.*.name"
        multiple: true
        hint: "Pilih tag dari daftar. Untuk menambah tag baru, masuk ke menu '⚙️ Site Setting' di sidebar kiri."

      - label: "Body"
        name: "body"
        widget: "markdown"

      - label: "Report Files (Lampiran)"
        name: "report_files"
        widget: "list"
        required: false
        hint: "Upload file laporan, kode, atau dokumen pendukung proyek ini. File HTML & PDF akan otomatis di-embed di halaman proyek."
        fields:
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "Judul file, misalnya 'Laporan Analisis Clustering' atau 'Source Code Python'"
          - label: "File"
            name: "file"
            widget: "file"
            media_folder: "/static/files"
            public_folder: "/files"
            hint: "Upload file (HTML, PDF, ZIP, CSV, PY, dll.)"

  - name: "projects_intro"
    label: "🚀 Projects (Welcome Text)"
    files:
      - name: "intro"
        label: "Welcome Text & Intro"
        file: "docs/projects/index.mdx"
        extension: "mdx"
        format: "frontmatter"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"

          - label: "Description"
            name: "description"
            widget: "text"

          - label: "Hide Table of Contents"
            name: "hide_table_of_contents"
            widget: "boolean"
            default: true

          - label: "Body"
            name: "body"
            widget: "markdown"
            hint: "Do not remove the <ProjectFilter /> component at the bottom."

  # ----------------------------------------------------------
  # 📝 Blog & Activities
  # ----------------------------------------------------------
  - name: "blog"
    label: "📝 Blog & Activities"
    label_singular: "Blog Post"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields:
      fields: ["title", "date"]
    fields:
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Body"
        name: "body"
        widget: "markdown"

      - label: "Report Files (Lampiran)"
        name: "report_files"
        widget: "list"
        required: false
        hint: "Upload file laporan, kode, atau dokumen pendukung. File HTML & PDF akan otomatis di-embed."
        fields:
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "Judul file, misalnya 'Laporan Analisis' atau 'Source Code'"
          - label: "File"
            name: "file"
            widget: "file"
            media_folder: "/static/files"
            public_folder: "/files"
            hint: "Upload file (HTML, PDF, ZIP, CSV, dll.)"

  # ----------------------------------------------------------
  # 👤 About Me
  # ----------------------------------------------------------
  - name: "about"
    label: "👤 About Me"
    files:
      - name: "about"
        label: "About Me Content"
        file: "docs/about.md"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"

          - label: "Description"
            name: "description"
            widget: "text"

          - label: "Body"
            name: "body"
            widget: "markdown"

  # ----------------------------------------------------------
  # ⚙️ Site Setting
  # ----------------------------------------------------------
  - name: "site_settings"
    label: "⚙️ Site Setting"
    files:
      - label: "CV / Resume"
        name: "cv_settings"
        file: "data/site.json"
        fields:
          - label: "Resume/CV (PDF)"
            name: "resume_pdf"
            widget: "file"
            hint: "Upload your CV/Resume here. This will update the 'Download CV' button."
            multiple: false

      - name: "project_tags"
        label: "Project Tags"
        file: "docs/tags-source.yml"
        fields:
          - label: "Daftar Tag"
            name: "tags"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Nama Tag", name: "name", widget: "string", hint: "e.g. machine-learning, python" }
