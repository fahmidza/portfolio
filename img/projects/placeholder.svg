<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1121"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#38bdf8" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Decorative circle glow -->
  <circle cx="400" cy="200" r="120" fill="#0ea5e9" opacity="0.03"/>
  <circle cx="400" cy="200" r="80" fill="#0ea5e9" opacity="0.04"/>

  <!-- Chart bars -->
  <g filter="url(#glow)">
    <rect x="310" y="230" width="36" height="90" rx="4" fill="url(#bar3)"/>
    <rect x="358" y="190" width="36" height="130" rx="4" fill="url(#bar2)"/>
    <rect x="406" y="155" width="36" height="165" rx="4" fill="url(#bar1)"/>
    <rect x="454" y="205" width="36" height="115" rx="4" fill="url(#bar2)"/>
  </g>

  <!-- Trend line -->
  <polyline points="328,220 376,180 424,148 472,195" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="328" cy="220" r="4" fill="#38bdf8"/>
  <circle cx="376" cy="180" r="4" fill="#38bdf8"/>
  <circle cx="424" cy="148" r="5" fill="#0ea5e9" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="472" cy="195" r="4" fill="#38bdf8"/>

  <!-- Base line -->
  <line x1="295" y1="325" x2="505" y2="325" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>

  <!-- Text -->
  <text x="400" y="385" text-anchor="middle" fill="#64748b" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="0.1em">PROJECT PREVIEW</text>
</svg>
